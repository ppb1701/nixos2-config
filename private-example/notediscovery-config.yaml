# EXAMPLE FILE - DO NOT USE AS-IS
# Copy to /etc/nixos/private/notediscovery-config.yaml and customize
# Generate password hash with: cd /var/lib/notediscovery && sudo -u notediscovery ./venv/bin/python3 generate_password.py
# Security settings
security:
  enabled: true
  username: "admin"
  # Generate a password hash using: python generate_password.py
  # IMPORTANT: Replace this example hash with your own!
  password_hash: "$2b$12$EXAMPLE_HASH_REPLACE_WITH_YOUR_OWN_GENERATED_HASH"

# Application settings
app:
  name: "My Knowledge Base"  # Customize your instance name
  host: "127.0.0.1"
  port: 5000  # Change if needed (default is 8000, but we use 5000 to avoid conflicts)
  debug: false

# Storage settings
# IMPORTANT: This is the correct structure - NOT app.notes_path!
storage:
  notes_dir: "/var/lib/obsidian/ppb"  # Path to your markdown notes
  cache_dir: "./cache"                # Cache directory (relative to app root)
  plugins_dir: "./plugins"            # Plugins directory (relative to app root)

# UI settings
ui:
  theme: "dark"           # Options: "dark" or "light"
  items_per_page: 50      # Number of notes to display per page
  enable_search: true     # Enable/disable search functionality

# Plugin settings
plugins:
  enabled: []  # List of enabled plugins (empty for basic functionality)

# Search settings
search:
  enabled: true


# ═══════════════════════════════════════════════════════════════════════════
# NOTES:
# - The storage.notes_dir should point to /var/lib/obsidian/ppb (or your chosen location)
# - Do NOT put notes in /home/username/ for system services - use /var/lib/ instead
# - Generate your password hash with: python /var/lib/notediscovery/generate_password.py
# - The PORT environment variable in services.nix overrides app.port
# ═══════════════════════════════════════════════════════════════════════════
